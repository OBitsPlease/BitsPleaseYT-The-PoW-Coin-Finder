name: Build And Release Installers

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub Release after the build completes
        required: false
        default: false
        type: boolean
      release_tag:
        description: Optional release tag to create when running manually, e.g. v1.0.7
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact_name: windows-installers
          - os: macos-latest
            script: dist:mac
            artifact_name: macos-installers

    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
      WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (signed)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CSC_LINK != '' && env.WINDOWS_CSC_KEY_PASSWORD != ''
        run: npm run ${{ matrix.script }}
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Build Windows installer (unsigned)
        if: matrix.os == 'windows-latest' && (env.WINDOWS_CSC_LINK == '' || env.WINDOWS_CSC_KEY_PASSWORD == '')
        run: npm run ${{ matrix.script }}

      - name: Build macOS installer (signed and notarized)
        if: matrix.os == 'macos-latest' && env.MACOS_CSC_LINK != '' && env.MACOS_CSC_KEY_PASSWORD != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: npm run ${{ matrix.script }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build macOS installer (unsigned)
        if: matrix.os == 'macos-latest' && (env.MACOS_CSC_LINK == '' || env.MACOS_CSC_KEY_PASSWORD == '' || env.APPLE_ID == '' || env.APPLE_APP_SPECIFIC_PASSWORD == '' || env.APPLE_TEAM_ID == '')
        run: npm run ${{ matrix.script }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)

    steps:
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release_tag input is required when publish_release is true for a manual run." >&2
          exit 1

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-installers'
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.blockmap